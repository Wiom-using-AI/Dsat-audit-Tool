{% extends "base_login.html" %}
{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">📊</span>
      <h1>DSAT Audit Tool</h1>
      <p>Wiom Quality Management</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Sign In →</button>
    </form>
    <p style="text-align:center;font-size:12px;color:#8a9bb0;margin-top:20px;">Contact your admin for login credentials.</p>
  </div>
</div>
{% endblock %}
