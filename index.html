<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSAT Audit Tool — Wiom</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f2057 0%,#1a56db 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:white}
.card{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:50px 60px;text-align:center;max-width:460px;width:90%}
.icon{font-size:56px;margin-bottom:16px;display:block}
h1{font-size:26px;font-weight:700;margin-bottom:8px}
p{font-size:15px;opacity:.8;margin-bottom:28px}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top:3px solid #fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.status{font-size:13px;opacity:.75}
.btn{display:inline-block;background:white;color:#1a56db;padding:13px 34px;border-radius:50px;font-weight:700;font-size:15px;text-decoration:none;margin-top:16px}
</style>
</head>
<body>
<div class="card">
  <span class="icon">📊</span>
  <h1>DSAT Audit Tool</h1>
  <p>Wiom Quality Management</p>
  <div id="box">
    <div class="spinner"></div>
    <div class="status" id="msg">Connecting to server...</div>
  </div>
</div>
<script>
fetch('https://raw.githubusercontent.com/Wiom-using-AI/Dsat-audit-Tool/main/current_url.json?t='+Date.now())
  .then(r=>r.json())
  .then(d=>{
    if(!d.url) throw new Error();
    document.getElementById('msg').textContent='Redirecting to DSAT Tool...';
    setTimeout(()=>{ window.location.replace(d.url); }, 600);
    document.getElementById('box').innerHTML += '<br><a class="btn" href="'+d.url+'">Open DSAT Tool →</a>';
  })
  .catch(()=>{
    document.getElementById('box').innerHTML='<div class="status" style="color:#fbbf24;line-height:1.8;">⚠️ Server is currently offline.<br>Please ask admin to start the tool<br>by running <strong>START DSAT TOOL.bat</strong></div>';
  });
</script>
</body>
</html>
