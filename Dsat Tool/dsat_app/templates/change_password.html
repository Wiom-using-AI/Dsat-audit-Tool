{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block page_heading %}Change Password{% endblock %}
{% block content %}
<div style="max-width:460px;margin:0 auto;">
  <div class="page-header">
    <div>
      <div class="page-title">Change Password</div>
      <div class="page-subtitle">Update your account password</div>
    </div>
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline">← Back</a>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Current Password <span class="required">*</span></label>
        <input type="password" name="current_password" class="form-control" required placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>New Password <span class="required">*</span></label>
        <input type="password" name="new_password" class="form-control" required placeholder="Minimum 6 characters">
      </div>
      <div class="form-group">
        <label>Confirm New Password <span class="required">*</span></label>
        <input type="password" name="confirm_password" class="form-control" required placeholder="Re-enter new password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
