{% extends "base_login.html" %}
{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">📊</span>
      <h1>DSAT Audit Tool</h1>
      <p>Wiom Quality Management</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@wiom.in" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Sign In →</button>
    </form>
    <p style="text-align:center;font-size:12px;color:#8a9bb0;margin-top:20px;">Contact admin for credentials</p>
  </div>
</div>
{% endblock %}
